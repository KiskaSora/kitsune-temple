<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Слева размытая аватарка, справа чёткая">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1d1411"/>
      <stop offset="100%" stop-color="#120c0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#e2551f" stop-opacity=".26"/>
      <stop offset="100%" stop-color="#e2551f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0a65a"/>
      <stop offset="100%" stop-color="#d8471a"/>
    </linearGradient>

    <!-- то самое мыло -->
    <filter id="soap" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <!-- половинки кадра -->
    <clipPath id="halfL"><rect x="0" y="0" width="320" height="360"/></clipPath>
    <clipPath id="halfR"><rect x="320" y="0" width="320" height="360"/></clipPath>
    <clipPath id="frame"><rect x="212" y="52" width="216" height="256" rx="4"/></clipPath>

    <!-- лис: тот же знак, что в шапке сайта -->
    <g id="fox">
      <path d="M4 4l7 3 5 6 5-6 7-3-2 12c0 6-4.5 12-10 12S6 22 6 16z" fill="url(#fur)"/>
      <circle cx="12" cy="15" r="1.4" fill="#1a0f0a"/>
      <circle cx="20" cy="15" r="1.4" fill="#1a0f0a"/>
    </g>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- кадр аватарки -->
  <g clip-path="url(#frame)">
    <rect x="212" y="52" width="216" height="256" fill="#0d0806"/>
    <g clip-path="url(#halfL)" filter="url(#soap)">
      <use href="#fox" transform="translate(212 72) scale(6.75)"/>
    </g>
    <g clip-path="url(#halfR)">
      <use href="#fox" transform="translate(212 72) scale(6.75)"/>
    </g>
  </g>
  <rect x="212" y="52" width="216" height="256" rx="4" fill="none" stroke="#e2551f" stroke-opacity=".45"/>

  <!-- шов между половинами -->
  <line x1="320" y1="52" x2="320" y2="308" stroke="#f6ece2" stroke-opacity=".5" stroke-dasharray="5 6"/>

  <!-- подписи -->
  <text x="266" y="336" text-anchor="middle" fill="#a89388"
        font-family="Golos Text, system-ui, sans-serif" font-size="13" letter-spacing="2.5">МЫЛО</text>
  <text x="374" y="336" text-anchor="middle" fill="#eab55c"
        font-family="Golos Text, system-ui, sans-serif" font-size="13" letter-spacing="2.5">ЧЁТКО</text>

  <!-- уголки в стиле сайта -->
  <g fill="none" stroke="#e2551f" stroke-opacity=".8" stroke-width="2.5" stroke-linecap="square">
    <path d="M28 60V28h32"/><path d="M612 60V28h-32"/>
    <path d="M28 300v32h32"/><path d="M612 300v32h-32"/>
  </g>
</svg>
