<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07050f"/>
      <stop offset="40%" stop-color="#110c1f"/>
      <stop offset="100%" stop-color="#07050f"/>
    </linearGradient>
    <radialGradient id="left-glow" cx="22%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="right-glow" cx="65%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fox-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="fox-glow-f">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#f97316" flood-opacity="0.6"/>
    </filter>
    <filter id="title-glow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#f97316" flood-opacity="0.4"/>
    </filter>
    <filter id="sub-glow">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#7c3aed" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="280" cy="200" rx="280" ry="200" fill="url(#left-glow)"/>
  <ellipse cx="830" cy="200" rx="420" ry="220" fill="url(#right-glow)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="420" cy="36" r="2" fill="rgba(249,115,22,0.4)"/>
  <circle cx="460" cy="22" r="1.5" fill="rgba(249,115,22,0.25)"/>
  <circle cx="1180" cy="360" r="2" fill="rgba(124,58,237,0.4)"/>
  <circle cx="1220" cy="340" r="1.5" fill="rgba(124,58,237,0.25)"/>

  <!-- ═══ FOX — left side, large ═══ -->
  <!-- Original fox viewBox: 256x157. We want it ~280px wide, so scale ≈ 1.09
       Centered vertically: y = (400-157*1.09)/2 ≈ 115. x = 28 -->
  <g transform="translate(28, 118) scale(1.08)" filter="url(#fox-glow-f)">
    <!-- Glow underlayer -->
    <path fill="#f97316" opacity="0.2"
      d="M253.823,41.499l-0.325,0.734c-2.41,5.503-8.319,9.204-14.332,9.204h-16.73v3.936
      c0,19.682-8.442,43.562-31.479,50.726l-3.909,41.513c2.862,1.12,4.892,3.898,4.892,7.156h-11.96
      l-4.781-51.275l-39-6.766c-10.755,13.121-27.175,23.474-44.585,26.549l-3.695,24.37
      c2.811,1.144,4.795,3.899,4.795,7.121H80.756l0.001-44.671c10.414-6.433,18.847-17.179,20.897-29.737
      c0,0-43.871,42.034-56.708,49.933c-5.012,3.084-10.609,4.676-16.121,4.676c-6.622,0-13.123-2.296-18.348-7.06
      c-9.654-8.802-11.272-23.402-3.78-34.105l0.722-1.035c5.007,5.223,11.765,7.918,18.623,7.918
      c4.441,0,8.925-1.131,13.003-3.438c12.878-7.285,33.765-21.585,41.987-26.531
      c5.561-3.345,13.409-6.095,19.728-7.581c15.761-3.706,67.877-8.57,67.877-8.57
      l53.797-52.336v16.513c0.079,0.006,0.411,0.059,1.616,0.298c4.89,0.973,9.251,3.723,12.227,7.723
      l5.686,7.642l10.742,4.341C253.79,39.186,254.295,40.431,253.823,41.499z
      M151.684,105.406l-13.191-2.288c-4.227,4.708-9.067,8.946-14.301,12.598l13.93,39.052h11.96
      c0-4.146-3.284-7.517-7.392-7.673l-5.613-27.44C142.607,115.672,147.418,110.796,151.684,105.406z
      M215.871,147.169l-6.906-44.331c-3.616,3.299-8.228,6.044-12.473,7.63l13.996,44.3h11.96
      C222.447,150.9,219.589,147.709,215.871,147.169z"/>
    <!-- Main fox -->
    <path fill="url(#fox-grad)"
      d="M253.823,41.499l-0.325,0.734c-2.41,5.503-8.319,9.204-14.332,9.204h-16.73v3.936
      c0,19.682-8.442,43.562-31.479,50.726l-3.909,41.513c2.862,1.12,4.892,3.898,4.892,7.156h-11.96
      l-4.781-51.275l-39-6.766c-10.755,13.121-27.175,23.474-44.585,26.549l-3.695,24.37
      c2.811,1.144,4.795,3.899,4.795,7.121H80.756l0.001-44.671c10.414-6.433,18.847-17.179,20.897-29.737
      c0,0-43.871,42.034-56.708,49.933c-5.012,3.084-10.609,4.676-16.121,4.676c-6.622,0-13.123-2.296-18.348-7.06
      c-9.654-8.802-11.272-23.402-3.78-34.105l0.722-1.035c5.007,5.223,11.765,7.918,18.623,7.918
      c4.441,0,8.925-1.131,13.003-3.438c12.878-7.285,33.765-21.585,41.987-26.531
      c5.561-3.345,13.409-6.095,19.728-7.581c15.761-3.706,67.877-8.57,67.877-8.57
      l53.797-52.336v16.513c0.079,0.006,0.411,0.059,1.616,0.298c4.89,0.973,9.251,3.723,12.227,7.723
      l5.686,7.642l10.742,4.341C253.79,39.186,254.295,40.431,253.823,41.499z
      M151.684,105.406l-13.191-2.288c-4.227,4.708-9.067,8.946-14.301,12.598l13.93,39.052h11.96
      c0-4.146-3.284-7.517-7.392-7.673l-5.613-27.44C142.607,115.672,147.418,110.796,151.684,105.406z
      M215.871,147.169l-6.906-44.331c-3.616,3.299-8.228,6.044-12.473,7.63l13.996,44.3h11.96
      C222.447,150.9,219.589,147.709,215.871,147.169z"/>
  </g>

  <!-- Vertical separator -->
  <line x1="320" y1="60" x2="320" y2="340" stroke="url(#line-grad)" stroke-width="1"/>

  <!-- ═══ TEXT — right side ═══ -->

  <!-- KitsuneDex -->
  <text x="360" y="196"
        font-family="'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="104" font-weight="900" letter-spacing="-3"
        filter="url(#title-glow)">
    <tspan fill="url(#title-grad)">Kitsune</tspan><tspan fill="#f0ede8">Dex</tspan>
  </text>

  <!-- Tagline -->
  <text x="362" y="250"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="24" font-weight="300" fill="rgba(200,195,230,0.6)"
        filter="url(#sub-glow)" letter-spacing="0.8">
    Браузер персонажей и чатов для SillyTavern
  </text>

  <!-- Tag pills -->
  <rect x="362" y="272" width="118" height="28" rx="14"
        fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.35)" stroke-width="1"/>
  <text x="421" y="291" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12.5" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing="0.8">
    v 1.0.0
  </text>

  <rect x="492" y="272" width="152" height="28" rx="14"
        fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.28)" stroke-width="1"/>
  <text x="568" y="291" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12.5" font-weight="600" fill="#fb923c" text-anchor="middle" letter-spacing="0.5">
    SillyTavern
  </text>

  <rect x="656" y="272" width="100" height="28" rx="14"
        fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <text x="706" y="291" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12.5" font-weight="600" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">
    MIT
  </text>

  <!-- Bottom rule + credit -->
  <line x1="362" y1="338" x2="920" y2="338" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="362" y="362"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="rgba(255,255,255,0.2)" letter-spacing="0.5">
    by Сора  ·  KitsuneDex  ·  2026
  </text>
</svg>
